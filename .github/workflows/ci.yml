name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and Test
        run: |
          xcodebuild test \
            -project OnAirCompanion.xcodeproj \
            -scheme OnAirCompanion \
            -destination 'platform=macOS'
