name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          # macOS 26+ requires Xcode 16+. Adjust path if needed for the runner image.
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer || true

      - name: Build Release
        run: |
          xcodebuild -project OnAirCompanion.xcodeproj \
            -scheme OnAirCompanion \
            -configuration Release \
            -derivedDataPath DerivedData \
            build

      - name: Package
        run: |
          cd DerivedData/Build/Products/Release
          zip -r "OnAirCompanion-${{ needs.release-please.outputs.tag_name }}.zip" OnAirCompanion.app

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" DerivedData/Build/Products/Release/OnAirCompanion-*.zip

      - name: Calculate SHA256
        id: sha256
        run: |
          SHA256=$(shasum -a 256 DerivedData/Build/Products/Release/OnAirCompanion-*.zip | awk '{ print $1 }')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v6
        with:
          repository: alampros/homebrew-tap
          path: tap
          ssh-key: ${{ secrets.TAP_DEPLOY_KEY }}

      - name: Bump cask and push
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${VERSION#v}"  # Strip leading 'v' for cask version

          cd tap

          sed -i '' "s/version \".*\"/version \"$VERSION\"/" Casks/onair-companion.rb
          sed -i '' -E "s/sha256 (\"[a-f0-9]{64}\"|:no_check)/sha256 \"${{ steps.sha256.outputs.sha256 }}\"/" Casks/onair-companion.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/onair-companion.rb
          git commit -m "chore: bump onair-companion to $VERSION"
          git push origin main
